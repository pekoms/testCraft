<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestCraft — Crea tus tests.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #F5F3EE;
      --surface: #FFFCF7;
      --surface2: #F0EDE6;
      --ink: #1A1814;
      --ink2: #5A5650;
      --ink3: #9A968F;
      --accent: #D4571C;
      --accent-light: #FBE9DF;
      --accent2: #2A6049;
      --accent2-light: #E0F0E8;
      --border: rgba(26, 24, 20, 0.1);
      --border-strong: rgba(26, 24, 20, 0.2);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── NAV ─────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .logo span {
      color: var(--accent);
    }

    .nav-actions {
      display: flex;
      gap: 8px;
    }

    /* ── BUTTONS ─────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-strong);
      background: transparent;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--surface2);
    }

    .btn.primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .btn.primary:hover {
      background: #333;
      border-color: #333;
    }

    .btn.accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn.accent:hover {
      background: #b8461a;
    }

    .btn.danger {
      color: #C0392B;
      border-color: rgba(192, 57, 43, 0.3);
    }

    .btn.danger:hover {
      background: #FDF0EE;
    }

    .btn.sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    .btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* ── VIEWS ───────────────────────────── */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* ── HOME ────────────────────────────── */
    #home {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .home-header {
      text-align: center;
      padding: 3rem 1rem 2.5rem;
    }

    .home-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }

    .home-header p {
      color: var(--ink2);
      font-size: 1rem;
      max-width: 400px;
      margin: 0 auto 1.5rem;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 0.75rem;
    }

    .tests-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .test-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .test-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .test-card h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
      padding-right: 2rem;
    }

    .test-card p {
      font-size: 12px;
      color: var(--ink3);
    }

    .test-card .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 8px;
      background: var(--accent-light);
      color: var(--accent);
    }

    .test-card .actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .test-card:hover .actions {
      opacity: 1;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--ink3);
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius);
    }

    .empty-state p {
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* ── EDITOR ──────────────────────────── */
    #editor {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .editor-header h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }

    .editor-header .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field-group {
      margin-bottom: 1.25rem;
    }

    .field-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .field-group input[type="text"],
    .field-group input[type="number"],
    .field-group textarea,
    .field-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.15s;
      outline: none;
    }

    .field-group input:focus,
    .field-group textarea:focus,
    .field-group select:focus {
      border-color: var(--accent);
    }

    .field-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media(max-width: 480px) {
      .settings-row {
        grid-template-columns: 1fr;
      }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.75rem 0;
    }

    /* Questions */
    .questions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      position: relative;
    }

    .question-card.dragging {
      opacity: 0.5;
    }

    .question-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .question-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--accent);
      background: var(--accent-light);
      padding: 3px 8px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .question-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-row input[type="text"] {
      flex: 1;
      padding: 7px 10px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .option-row input[type="text"]:focus {
      border-color: var(--accent);
    }

    .option-row .correct-check {
      width: 18px;
      height: 18px;
      accent-color: var(--accent2);
      cursor: pointer;
      flex-shrink: 0;
    }

    .option-row .del-opt {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink3);
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .option-row .del-opt:hover {
      color: #C0392B;
      background: #FDF0EE;
    }

    .type-toggle {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .type-btn {
      padding: 5px 12px;
      border: 1.5px solid var(--border-strong);
      border-radius: 99px;
      background: transparent;
      color: var(--ink2);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .type-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .add-question-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
      margin-top: 8px;
    }

    .add-question-btn:hover {
      background: var(--surface);
      color: var(--ink);
    }

    /* ── PLAYER ──────────────────────────── */
    #player {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .player-header {
      margin-bottom: 2rem;
    }

    .player-header h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .progress-bar-wrap {
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      margin-top: 1rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--ink3);
      margin-top: 6px;
    }

    .question-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .question-box .q-text {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .options-play {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-play {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: var(--bg);
      transition: all 0.15s;
      user-select: none;
    }

    .option-play:hover {
      background: var(--surface);
      border-color: var(--ink);
    }

    .option-play.selected {
      border-color: var(--accent2);
      background: var(--accent2-light);
    }

    .option-play.correct {
      border-color: var(--accent2);
      background: var(--accent2-light);
    }

    .option-play.wrong {
      border-color: #C0392B;
      background: #FDF0EE;
    }

    .option-play.correct-missed {
      border-color: var(--accent2);
      background: transparent;
      border-style: dashed;
    }

    .option-play.locked {
      cursor: default;
    }

    .option-play.locked:hover {
      background: var(--bg);
    }

    .option-play.selected.locked:hover {
      background: var(--accent2-light);
    }

    .option-play.correct.locked:hover {
      background: var(--accent2-light);
    }

    .option-play.wrong.locked:hover {
      background: #FDF0EE;
    }

    .feedback-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 14px;
    }

    .feedback-banner.ok {
      background: var(--accent2-light);
      color: var(--accent2);
    }

    .feedback-banner.fail {
      background: #FDF0EE;
      color: #C0392B;
    }

    .feedback-banner svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .option-marker {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border-strong);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .option-play.selected .option-marker,
    .option-play.correct .option-marker {
      background: var(--accent2);
      border-color: var(--accent2);
    }

    .option-play.wrong .option-marker {
      background: #C0392B;
      border-color: #C0392B;
    }

    .open-answer textarea {
      width: 100%;
      min-height: 100px;
      padding: 10px 12px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    .open-answer textarea:focus {
      border-color: var(--accent);
    }

    .player-nav {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ── RESULTS ─────────────────────────── */
    #results {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .score-hero {
      text-align: center;
      padding: 2.5rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
    }

    .score-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 1;
    }

    .score-label {
      color: var(--ink2);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .review-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .review-item.ok {
      border-left: 3px solid var(--accent2);
    }

    .review-item.fail {
      border-left: 3px solid #C0392B;
    }

    .review-item.open {
      border-left: 3px solid var(--accent);
    }

    .review-q {
      font-weight: 500;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .review-answer {
      font-size: 0.85rem;
      color: var(--ink2);
    }

    .review-answer .tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 99px;
      font-size: 11px;
      margin-right: 4px;
    }

    .tag.ok {
      background: var(--accent2-light);
      color: var(--accent2);
    }

    .tag.fail {
      background: #FDF0EE;
      color: #C0392B;
    }

    .tag.open {
      background: var(--accent-light);
      color: var(--accent);
    }

    .results-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    /* ── MODAL ───────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 24, 20, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.75rem;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--border-strong);
    }

    .modal h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .modal p {
      color: var(--ink2);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ── TOAST ───────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--ink);
      color: #fff;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s ease;
      z-index: 300;
      max-width: 280px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* ── RESPONSIVE ──────────────────────── */
    @media(max-width: 600px) {
      nav {
        padding: 0 1rem;
      }

      #home,
      #editor,
      #player,
      #results {
        padding: 1.25rem 1rem;
      }

      .home-header {
        padding: 2rem 0.5rem 1.75rem;
      }

      .editor-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* ── AUTH / LOGIN ────────────────────── */
    body.auth-locked .view {
      display: none !important;
    }

    body.auth-locked #navActions {
      display: none;
    }

    #userBadge {
      display: none;
    }

    body.logged-in #userBadge {
      display: flex;
    }

    #login {
      display: none;
    }

    body.auth-locked #login {
      display: flex;
      min-height: calc(100vh - 56px);
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .auth-card {
      max-width: 380px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .auth-card h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .auth-card .sub {
      color: var(--ink2);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .auth-card .field-group {
      margin-bottom: 1rem;
    }

    .auth-card input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .auth-card input:focus {
      border-color: var(--accent);
    }

    .auth-card .btn {
      width: 100%;
      justify-content: center;
      padding: 11px;
      font-size: 14px;
      margin-top: 4px;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--ink2);
    }

    .auth-toggle a {
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }

    .auth-toggle a:hover {
      text-decoration: underline;
    }

    .auth-msg {
      font-size: 0.85rem;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      display: none;
    }

    .auth-msg.show {
      display: block;
    }

    .auth-msg.error {
      background: #FDF0EE;
      color: #C0392B;
    }

    .auth-msg.info {
      background: var(--accent2-light);
      color: var(--accent2);
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink2);
    }

    .user-badge .email {
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>

<body class="auth-locked">

  <nav>
    <div class="logo">Test<span>Craft</span></div>
    <div class="nav-actions" id="navActions">
      <button class="btn" onclick="showView('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Inicio
      </button>
    </div>
    <div class="user-badge" id="userBadge">
      <span id="userRole"
        style="display:none; background:var(--accent-light); color:var(--accent); padding:2px 8px; border-radius:99px; font-size:11px; font-weight:500;"></span>
      <span class="email" id="userEmail"></span>
      <button class="btn sm" onclick="doSignOut()" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Salir
      </button>
    </div>
  </nav>

  <!-- LOGIN -->
  <div id="login">
    <div class="auth-card">
      <h2 id="authTitle">Iniciar sesión</h2>
      <p class="sub" id="authSub">Accede para crear y hacer tus tests.</p>
      <div class="auth-msg" id="authMsg"></div>
      <div class="field-group">
        <input type="email" id="authEmail" placeholder="Correo electrónico" autocomplete="email">
      </div>
      <div class="field-group">
        <input type="password" id="authPassword" placeholder="Contraseña" autocomplete="current-password">
      </div>
      <div class="field-group" id="newPasswordGroup" style="display:none">
        <input type="password" id="authNewPassword" placeholder="Nueva contraseña" autocomplete="new-password">
      </div>
      <button class="btn accent" id="authSubmit" onclick="submitAuth()">Entrar</button>
      <div class="auth-toggle" id="authToggle">
        <a onclick="showForgotPanel()">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="view active">
    <div class="home-header">
      <h1 id="homeTitle">Crea y comparte<br>tus <span style="color:var(--accent)">tests</span></h1>
      <p id="homeSubtitle">Diseña tests con preguntas de opción múltiple o respuesta abierta.</p>
      <button class="btn accent" id="newTestBtn" onclick="newTest()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Nuevo test
      </button>
    </div>

    <div class="section-title" id="testsSectionTitle">Mis tests</div>
    <div class="tests-grid" id="testsGrid"></div>
  </div>

  <!-- EDITOR -->
  <div id="editor" class="view">
    <div class="editor-header">
      <h2 id="editorTitle">Nuevo test</h2>
      <div class="actions">
        <button class="btn" onclick="confirmBack()">Cancelar</button>
        <button class="btn accent" onclick="saveTest()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Guardar
        </button>
      </div>
    </div>

    <div class="field-group">
      <label>Título del test</label>
      <input type="text" id="testTitle" placeholder="Ej: Historia de España Tema 4" maxlength="80">
    </div>
    <div class="field-group">
      <label>Descripción (opcional)</label>
      <input type="text" id="testDesc" placeholder="Una breve descripción del test" maxlength="200">
    </div>

    <div class="settings-row">
      <div class="field-group">
        <label>Tiempo límite (minutos)</label>
        <input type="number" id="testTime" min="0" max="360" value="0" placeholder="0 = sin límite">
      </div>
      <div class="field-group">
        <label>Orden aleatorio</label>
        <select id="testShuffle">
          <option value="0">No — orden fijo</option>
          <option value="1">Sí — aleatorio</option>
        </select>
      </div>
      <div class="field-group">
        <label>Visible para alumnos</label>
        <select id="testPublished">
          <option value="0">No — borrador (solo yo)</option>
          <option value="1">Sí — publicado</option>
        </select>
      </div>
    </div>

    <hr class="divider">
    <div class="section-title" style="margin-bottom:1rem;">Preguntas</div>
    <div class="questions-list" id="questionsList"></div>
    <button class="add-question-btn" onclick="addQuestion()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      Añadir pregunta
    </button>
  </div>

  <!-- PLAYER -->
  <div id="player" class="view">
    <div class="player-header">
      <h2 id="playerTitle"></h2>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span id="progressText">Pregunta 1 de 1</span>
        <span id="timerText"></span>
      </div>
    </div>

    <div class="question-box" id="questionBox"></div>

    <div class="player-nav">
      <button class="btn" id="prevBtn" onclick="prevQuestion()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Anterior
      </button>
      <button class="btn accent" id="nextBtn" onclick="nextQuestion()">
        Siguiente
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="view">
    <div class="score-hero">
      <div class="score-num" id="scoreNum">—</div>
      <div class="score-label" id="scoreLabel"></div>
    </div>
    <div class="section-title">Revisión de respuestas</div>
    <div class="review-list" id="reviewList"></div>
    <div class="results-actions">
      <button class="btn" onclick="showView('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
        Inicio
      </button>
      <button class="btn accent" id="retryBtn" onclick="retryTest()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 .49-4.16" />
        </svg>
        Reintentar
      </button>
      <button class="btn primary" id="shareBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
        </svg>
        Compartir
      </button>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <p id="modalBody"></p>
      <div class="modal-actions">
        <button class="btn" id="modalCancel">Cancelar</button>
        <button class="btn danger" id="modalConfirm">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ──────────────────────────────────────────
    // STORAGE
    // ──────────────────────────────────────────
    const STORE_KEY = 'testcraft_tests_v1';

    // ──────────────────────────────────────────
    // JSONBIN.IO — almacenamiento en la nube (enlaces cortos)
    // Pega aquí tu API Key de jsonbin.io. Si la dejas vacía,
    // la app usará enlaces largos (el test va codificado en la URL).
    // ──────────────────────────────────────────
    const JSONBIN_KEY = ''; // <-- PEGA AQUÍ TU MASTER KEY o ACCESS KEY
    const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

    // ──────────────────────────────────────────
    // SUPABASE — login real (gratuito)
    // 1. Crea un proyecto en https://supabase.com
    // 2. En "Project Settings > API" copia la URL y la clave "anon public"
    // 3. Pégalas aquí abajo. La clave anon es PÚBLICA y es seguro exponerla.
    // Si las dejas vacías, la app se abre sin login (modo abierto).
    // ──────────────────────────────────────────
    const SUPABASE_URL = 'https://elkpidhrypunslxqsppo.supabase.co';      // <-- p.ej: https://xxxxxxxx.supabase.co
    const SUPABASE_ANON_KEY = 'sb_publishable_Z6Xd-k-nDCVhy-zWCSOjRQ_3CGR_mxO'; // <-- tu clave anon public
    let sbClient = null;


    let currentUser = null;
    let isTeacher = false; // se determina tras el login según la tabla profiles

    // Almacenamiento local (fallback cuando no hay login configurado)
    function loadTestsLocal()
    {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }
    function saveTestsLocal(arr)
    {
      localStorage.setItem(STORE_KEY, JSON.stringify(arr));
    }

    // ¿Estamos usando la nube (Supabase con sesión activa)?
    function usingCloud() { return !!(sbClient && currentUser); }

    // Saber si el usuario actual es profesor (lee la tabla profiles)
    async function fetchRole()
    {
      if (!usingCloud()) return true; // modo local/abierto: acceso total
      const { data, error } = await sbClient
        .from('profiles').select('is_teacher').eq('id', currentUser.id).maybeSingle();
      if (error) { console.error(error); return false; }
      return !!(data && data.is_teacher);
    }

    // Cargar tests: el profesor ve los suyos; el alumno ve los publicados
    async function fetchTests()
    {
      if (usingCloud())
      {
        let q = sbClient.from('tests').select('data, updated_at, published');
        if (isTeacher) q = q.eq('user_id', currentUser.id);
        else q = q.eq('published', true);
        const { data, error } = await q.order('updated_at', { ascending: false });
        if (error) { console.error(error); showToast('Error al cargar los tests'); return []; }
        return data.map(row => ({ ...row.data, published: row.published }));
      }
      return loadTestsLocal();
    }

    // Crear o actualizar un test (solo profesores; la RLS también lo exige)
    async function persistTest(test)
    {
      if (usingCloud())
      {
        const { error } = await sbClient.from('tests').upsert({
          id: test.id,
          user_id: currentUser.id,
          data: test,
          published: !!test.published,
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id,id' });
        if (error) { console.error(error); showToast('Error al guardar en la nube'); return false; }
        return true;
      }
      const arr = loadTestsLocal();
      const idx = arr.findIndex(x => x.id === test.id);
      if (idx >= 0) arr[idx] = test; else arr.push(test);
      saveTestsLocal(arr);
      return true;
    }

    // Eliminar un test
    async function removeTest(id)
    {
      if (usingCloud())
      {
        const { error } = await sbClient.from('tests').delete().eq('id', id);
        if (error) { console.error(error); showToast('Error al eliminar'); return false; }
        return true;
      }
      saveTestsLocal(loadTestsLocal().filter(x => x.id !== id));
      return true;
    }

    // ──────────────────────────────────────────
    // STATE
    // ──────────────────────────────────────────
    let tests = [];
    let editingId = null;
    let editingQuestions = [];
    let playerState = {
      test: null,
      questions: [],
      current: 0,
      answers: {},
      timerInterval: null,
      timeLeft: 0
    };

    // ──────────────────────────────────────────
    // UTILS
    // ──────────────────────────────────────────
    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function showToast(msg)
    {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
    function showModal(title, body, onConfirm, confirmLabel = 'Eliminar', danger = true)
    {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalBody').textContent = body;
      const btn = document.getElementById('modalConfirm');
      btn.textContent = confirmLabel;
      btn.className = 'btn ' + (danger ? 'danger' : 'primary');
      document.getElementById('modalOverlay').classList.add('open');
      btn.onclick = () => { closeModal(); onConfirm(); };
      document.getElementById('modalCancel').onclick = closeModal;
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function showView(id)
    {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }

    // ──────────────────────────────────────────
    // HOME
    // ──────────────────────────────────────────
    function renderHome()
    {
      // Ajustar textos y botones según el rol
      const newBtn = document.getElementById('newTestBtn');
      const title = document.getElementById('homeTitle');
      const subtitle = document.getElementById('homeSubtitle');
      const sectionTitle = document.getElementById('testsSectionTitle');
      if (isTeacher)
      {
        newBtn.style.display = 'inline-flex';
        title.innerHTML = 'Crea y comparte<br>tus <span style="color:var(--accent)">tests</span>';
        subtitle.textContent = 'Diseña tests y publícalos para que los vean tus alumnos.';
        sectionTitle.textContent = 'Mis tests';
      } else
      {
        newBtn.style.display = 'none';
        title.innerHTML = 'Tus <span style="color:var(--accent)">tests</span>';
        subtitle.textContent = 'Estos son los tests que tu profesor ha publicado.';
        sectionTitle.textContent = 'Tests disponibles';
      }

      const grid = document.getElementById('testsGrid');
      if (!tests.length)
      {
        grid.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--ink3);margin:0 auto 8px;display:block"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="15" x2="12" y2="15"/></svg>
      <strong>${isTeacher ? 'Aún no tienes tests' : 'No hay tests disponibles'}</strong>
      <p>${isTeacher ? 'Crea tu primer test con el botón de arriba.' : 'Cuando tu profesor publique un test, aparecerá aquí.'}</p></div>`;
        return;
      }

      grid.innerHTML = tests.map(t =>
      {
        const meta = `
      <h3>${escHtml(t.title)}</h3>
      <p>${escHtml(t.description || 'Sin descripción')}</p>
      <span class="badge">${t.questions.length} pregunta${t.questions.length !== 1 ? 's' : ''}</span>
      ${t.timeLimit ? `<span class="badge" style="background:var(--accent2-light);color:var(--accent2);margin-left:4px">⏱ ${t.timeLimit} min</span>` : ''}`;

        if (!isTeacher)
        {
          return `<div class="test-card" onclick="startTest('${t.id}')">${meta}</div>`;
        }

        const pubBadge = t.published
          ? `<span class="badge" style="background:var(--accent2-light);color:var(--accent2);margin-left:4px">Publicado</span>`
          : `<span class="badge" style="background:var(--surface2);color:var(--ink3);margin-left:4px">Borrador</span>`;

        return `
    <div class="test-card" onclick="startTest('${t.id}')">
      <div class="actions" onclick="event.stopPropagation()">
        <button class="btn sm" onclick="togglePublish('${t.id}')" title="${t.published ? 'Ocultar a los alumnos' : 'Publicar para los alumnos'}">
          ${t.published
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'}
        </button>
        <button class="btn sm" onclick="editTest('${t.id}')" title="Editar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn sm danger" onclick="deleteTest('${t.id}')" title="Eliminar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
      ${meta}
      <div style="margin-top:8px">${pubBadge}</div>
    </div>`;
      }).join('');
    }

    async function togglePublish(id)
    {
      const t = tests.find(x => x.id === id);
      if (!t) return;
      t.published = !t.published;
      const ok = await persistTest(t);
      if (!ok) { t.published = !t.published; return; }
      renderHome();
      showToast(t.published ? 'Test publicado para los alumnos ✓' : 'Test ocultado (borrador)');
    }
    function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function deleteTest(id)
    {
      const t = tests.find(x => x.id === id);
      showModal(`Eliminar "${t.title}"`, '¿Seguro? Esta acción no se puede deshacer.', async () =>
      {
        const ok = await removeTest(id);
        if (!ok) return;
        tests = tests.filter(x => x.id !== id);
        renderHome();
        showToast('Test eliminado');
      });
    }

    // ──────────────────────────────────────────
    // EDITOR
    // ──────────────────────────────────────────
    function newTest()
    {
      editingId = null;
      editingQuestions = [];
      document.getElementById('testTitle').value = '';
      document.getElementById('testDesc').value = '';
      document.getElementById('testTime').value = 0;
      document.getElementById('testShuffle').value = 0;
      document.getElementById('testPublished').value = 0;
      document.getElementById('editorTitle').textContent = 'Nuevo test';
      renderQuestions();
      addQuestion();
      showView('editor');
    }

    function editTest(id)
    {
      const t = tests.find(x => x.id === id);
      editingId = id;
      editingQuestions = JSON.parse(JSON.stringify(t.questions));
      document.getElementById('testTitle').value = t.title;
      document.getElementById('testDesc').value = t.description || '';
      document.getElementById('testTime').value = t.timeLimit || 0;
      document.getElementById('testShuffle').value = t.shuffle ? 1 : 0;
      document.getElementById('testPublished').value = t.published ? 1 : 0;
      document.getElementById('editorTitle').textContent = 'Editar test';
      renderQuestions();
      showView('editor');
    }

    function confirmBack()
    {
      showModal('¿Salir sin guardar?', 'Los cambios no guardados se perderán.', () =>
      {
        showView('home'); renderHome();
      }, 'Salir', true);
    }

    // ──── Guardar test ────
    async function saveTest()
    {
      const title = document.getElementById('testTitle').value.trim();
      if (!title) { showToast('El título es obligatorio'); return; }
      if (!editingQuestions.length) { showToast('Añade al menos una pregunta'); return; }

      // Collect question data from DOM
      const qCards = document.querySelectorAll('#questionsList .question-card');
      const questions = [];
      let valid = true;
      qCards.forEach((card, i) =>
      {
        const q = editingQuestions[i];
        q.text = card.querySelector('.q-text-input').value.trim();
        if (!q.text) { showToast(`La pregunta ${i + 1} no tiene texto`); valid = false; return; }
        if (q.type === 'multiple' || q.type === 'single')
        {
          const rows = card.querySelectorAll('.option-row');
          q.options = [];
          rows.forEach(row =>
          {
            const txt = row.querySelector('input[type="text"]').value.trim();
            const correct = row.querySelector('.correct-check').checked;
            if (txt) q.options.push({ text: txt, correct });
          });
          if (q.options.length < 2) { showToast(`La pregunta ${i + 1} necesita al menos 2 opciones`); valid = false; return; }
          if (!q.options.some(o => o.correct)) { showToast(`Marca al menos una respuesta correcta en la pregunta ${i + 1}`); valid = false; return; }
        }
        questions.push(q);
      });
      if (!valid) return;

      const test = {
        id: editingId || genId(),
        title,
        description: document.getElementById('testDesc').value.trim(),
        timeLimit: parseInt(document.getElementById('testTime').value) || 0,
        shuffle: document.getElementById('testShuffle').value === '1',
        published: document.getElementById('testPublished').value === '1',
        questions,
        createdAt: editingId ? (tests.find(x => x.id === editingId)?.createdAt || Date.now()) : Date.now(),
        updatedAt: Date.now()
      };

      const ok = await persistTest(test);
      if (!ok) return;

      if (editingId)
      {
        tests = tests.map(x => x.id === editingId ? test : x);
      } else
      {
        tests.unshift(test);
      }
      renderHome();
      showView('home');
      showToast('Test guardado ✓');
    }

    // ──── Questions editor ────
    function addQuestion()
    {
      editingQuestions.push({
        id: genId(), type: 'single',
        text: '', options: [
          { text: '', correct: true },
          { text: '', correct: false }
        ]
      });
      renderQuestions();
      // scroll to bottom
      setTimeout(() =>
      {
        const list = document.getElementById('questionsList');
        list.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }

    function removeQuestion(i)
    {
      editingQuestions.splice(i, 1);
      renderQuestions();
    }

    function changeQuestionType(i, type)
    {
      editingQuestions[i].type = type;
      if ((type === 'single' || type === 'multiple') && !editingQuestions[i].options)
      {
        editingQuestions[i].options = [{ text: '', correct: true }, { text: '', correct: false }];
      }
      renderQuestions();
    }

    function addOption(i)
    {
      editingQuestions[i].options.push({ text: '', correct: false });
      renderQuestions();
    }

    function removeOption(qi, oi)
    {
      editingQuestions[qi].options.splice(oi, 1);
      renderQuestions();
    }

    function renderQuestions()
    {
      const list = document.getElementById('questionsList');
      list.innerHTML = editingQuestions.map((q, i) => `
    <div class="question-card" data-idx="${i}">
      <div class="question-header">
        <span class="question-num">P${i + 1}</span>
        <div class="type-toggle">
          <button class="type-btn ${q.type === 'single' ? 'active' : ''}" onclick="changeQuestionType(${i},'single')">Una respuesta</button>
          <button class="type-btn ${q.type === 'multiple' ? 'active' : ''}" onclick="changeQuestionType(${i},'multiple')">Múltiple</button>
          <button class="type-btn ${q.type === 'open' ? 'active' : ''}" onclick="changeQuestionType(${i},'open')">Abierta</button>
        </div>
        <div class="question-actions">
          ${i > 0 ? `<button class="btn sm" title="Subir" onclick="moveQuestion(${i},-1)">↑</button>` : ''}
          ${i < editingQuestions.length - 1 ? `<button class="btn sm" title="Bajar" onclick="moveQuestion(${i},1)">↓</button>` : ''}
          <button class="btn sm danger" onclick="removeQuestion(${i})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="field-group" style="margin-bottom:${q.type !== 'open' ? '0.75rem' : '0'}">
        <input type="text" class="q-text-input" placeholder="Escribe la pregunta..." value="${escHtml(q.text)}" oninput="editingQuestions[${i}].text=this.value">
      </div>
      ${q.type !== 'open' ? `
        <div class="options-list" id="opts_${i}">
          ${q.options.map((o, oi) => `
            <div class="option-row">
              <input type="${q.type === 'multiple' ? 'checkbox' : 'radio'}" class="correct-check" ${o.correct ? 'checked' : ''} name="correct_${i}" title="Respuesta correcta"
                onchange="handleCorrectChange(${i},${oi},this)">
              <input type="text" placeholder="Opción ${oi + 1}" value="${escHtml(o.text)}" oninput="editingQuestions[${i}].options[${oi}].text=this.value">
              ${q.options.length > 2 ? `<button class="del-opt" onclick="removeOption(${i},${oi})" title="Eliminar opción">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>` : ''}
            </div>`).join('')}
        </div>
        <button class="btn sm" style="margin-top:8px" onclick="addOption(${i})">+ Añadir opción</button>
        <p style="font-size:11px;color:var(--ink3);margin-top:6px">
          ${q.type === 'single' ? 'Selecciona la opción correcta (radio)' : 'Selecciona todas las opciones correctas (checkbox)'}
        </p>
      ` : '<p style="font-size:12px;color:var(--ink3);margin-top:4px">El usuario escribirá su respuesta libremente. Se revisará manualmente.</p>'}
    </div>`).join('');
    }

    function handleCorrectChange(qi, oi, el)
    {
      if (editingQuestions[qi].type === 'single')
      {
        editingQuestions[qi].options.forEach((o, i) => o.correct = i === oi);
        // sync radios visually
        document.querySelectorAll(`input[name="correct_${qi}"]`).forEach((r, i) =>
        {
          r.checked = i === oi;
          editingQuestions[qi].options[i].correct = i === oi;
        });
      } else
      {
        editingQuestions[qi].options[oi].correct = el.checked;
      }
    }

    function moveQuestion(i, dir)
    {
      const j = i + dir;
      if (j < 0 || j >= editingQuestions.length) return;
      [editingQuestions[i], editingQuestions[j]] = [editingQuestions[j], editingQuestions[i]];
      renderQuestions();
    }

    // ──────────────────────────────────────────
    // PLAYER
    // ──────────────────────────────────────────
    function startTest(id)
    {
      const t = tests.find(x => x.id === id);
      if (!t || !t.questions.length) { showToast('Este test no tiene preguntas'); return; }
      let qs = JSON.parse(JSON.stringify(t.questions));
      if (t.shuffle) qs = qs.sort(() => Math.random() - 0.5);
      playerState = {
        test: t, questions: qs, current: 0, answers: {}, revealed: {},
        timerInterval: null, timeLeft: (t.timeLimit || 0) * 60
      };
      document.getElementById('playerTitle').textContent = t.title;
      if (t.timeLimit) startTimer();
      renderPlayerQuestion();
      showView('player');
    }

    function startTimer()
    {
      const el = document.getElementById('timerText');
      clearInterval(playerState.timerInterval);
      playerState.timerInterval = setInterval(() =>
      {
        playerState.timeLeft--;
        const m = Math.floor(playerState.timeLeft / 60);
        const s = playerState.timeLeft % 60;
        el.textContent = `⏱ ${m}:${String(s).padStart(2, '0')}`;
        if (playerState.timeLeft <= 0)
        {
          clearInterval(playerState.timerInterval);
          showToast('⏱ Tiempo agotado');
          finishTest();
        }
      }, 1000);
    }

    function renderPlayerQuestion()
    {
      const { questions, current, answers, revealed } = playerState;
      const q = questions[current];
      const total = questions.length;
      const instant = true;

      document.getElementById('progressFill').style.width = ((current / total) * 100) + '%';
      document.getElementById('progressText').textContent = `Pregunta ${current + 1} de ${total}`;

      const box = document.getElementById('questionBox');
      const saved = answers[current];

      if (q.type === 'open')
      {
        box.innerHTML = `
      <div class="q-text">${escHtml(q.text)}</div>
      <div class="open-answer">
        <textarea placeholder="Escribe tu respuesta aquí..." id="openAns">${escHtml(saved || '')}</textarea>
      </div>`;
      } else
      {
        const multi = q.type === 'multiple';
        const sel = saved ? (Array.isArray(saved) ? saved : [saved]) : [];
        const isRevealed = instant && revealed[current];
        const correctIndices = q.options.map((o, j) => o.correct ? j : -1).filter(j => j >= 0);
        const isCorrect = correctIndices.length === sel.length && correctIndices.every(j => sel.includes(j));

        box.innerHTML = `
      <div class="q-text">${escHtml(q.text)}</div>
      ${multi ? '<p style="font-size:12px;color:var(--ink3);margin-bottom:8px">Selecciona todas las correctas</p>' : ''}
      <div class="options-play">
        ${q.options.map((o, oi) =>
        {
          let cls = '';
          if (isRevealed)
          {
            if (o.correct && sel.includes(oi)) cls = 'correct';
            else if (o.correct && !sel.includes(oi)) cls = 'correct-missed';
            else if (!o.correct && sel.includes(oi)) cls = 'wrong';
            cls += ' locked';
          } else if (sel.includes(oi))
          {
            cls = 'selected';
          }
          let markerIcon = '';
          if (isRevealed && (cls.includes('correct') || cls.includes('wrong')))
          {
            markerIcon = cls.includes('wrong')
              ? '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" width="10" height="10"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
              : '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg>';
          } else if (!isRevealed && sel.includes(oi))
          {
            markerIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg>';
          }
          return `<div class="option-play ${cls}" ${isRevealed ? '' : `onclick="selectOption(${oi})"`}>
            <div class="option-marker">${markerIcon}</div>
            <span>${escHtml(o.text)}</span>
          </div>`;
        }).join('')}
      </div>
      ${isRevealed ? `<div class="feedback-banner ${isCorrect ? 'ok' : 'fail'}">
        ${isCorrect
              ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> ¡Correcto!'
              : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Incorrecto. La respuesta marcada en verde es la correcta.'}
      </div>` : ''}
      ${instant && !isRevealed && multi ? `<button class="btn accent" style="margin-top:14px" onclick="revealAnswer()">Comprobar respuesta</button>` : ''}`;
      }

      document.getElementById('prevBtn').style.visibility = current === 0 ? 'hidden' : 'visible';
      const isLast = current === total - 1;
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.innerHTML = isLast
        ? `Finalizar <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="20 6 9 17 4 12"/></svg>`
        : `Siguiente <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="9 18 15 12 9 6"/></svg>`;
    }

    function revealAnswer()
    {
      const { current, answers } = playerState;
      const sel = answers[current];
      if (!sel || !sel.length) { showToast('Selecciona al menos una opción'); return; }
      playerState.revealed[current] = true;
      renderPlayerQuestion();
    }

    function selectOption(oi)
    {
      const { questions, current, answers, revealed } = playerState;
      const q = questions[current];
      if (revealed[current]) return; // ya revelada, bloqueada
      if (q.type === 'multiple')
      {
        let sel = answers[current] ? [...answers[current]] : [];
        const idx = sel.indexOf(oi);
        if (idx >= 0) sel.splice(idx, 1); else sel.push(oi);
        playerState.answers[current] = sel;
      } else
      {
        playerState.answers[current] = [oi];
        playerState.revealed[current] = true; // corrige al instante
      }
      renderPlayerQuestion();
    }

    function saveCurrentAnswer()
    {
      const { questions, current } = playerState;
      const q = questions[current];
      if (q.type === 'open')
      {
        const val = document.getElementById('openAns')?.value.trim();
        if (val) playerState.answers[current] = val;
      }
    }

    function nextQuestion()
    {
      saveCurrentAnswer();
      const { questions, current } = playerState;
      if (current === questions.length - 1) { finishTest(); return; }
      playerState.current++;
      renderPlayerQuestion();
    }

    function prevQuestion()
    {
      saveCurrentAnswer();
      if (playerState.current === 0) return;
      playerState.current--;
      renderPlayerQuestion();
    }

    function finishTest()
    {
      clearInterval(playerState.timerInterval);
      saveCurrentAnswer();
      showResults();
    }

    // ──────────────────────────────────────────
    // RESULTS
    // ──────────────────────────────────────────
    function showResults()
    {
      const { questions, answers } = playerState;
      let correct = 0, total = 0;
      const reviewItems = questions.map((q, i) =>
      {
        const ans = answers[i];
        if (q.type === 'open')
        {
          return { q, ans, type: 'open' };
        }
        total++;
        const correctIndices = q.options.map((o, j) => o.correct ? j : -1).filter(j => j >= 0);
        const selArr = ans ? (Array.isArray(ans) ? ans : [ans]) : [];
        const isCorrect = correctIndices.length === selArr.length &&
          correctIndices.every(j => selArr.includes(j));
        if (isCorrect) correct++;
        return { q, ans: selArr, correctIndices, isCorrect };
      });

      const pct = total > 0 ? Math.round((correct / total) * 100) : null;
      document.getElementById('scoreNum').textContent = pct !== null ? pct + '%' : '—';
      document.getElementById('scoreLabel').textContent =
        pct !== null
          ? `${correct} de ${total} preguntas correctas`
          : 'Test de respuesta abierta — revisión manual';

      const rl = document.getElementById('reviewList');
      rl.innerHTML = reviewItems.map((item, i) =>
      {
        if (item.type === 'open')
        {
          return `<div class="review-item open">
        <div class="review-q">${escHtml(item.q.text)}</div>
        <div class="review-answer"><span class="tag open">Abierta</span>${item.ans ? escHtml(item.ans) : '<em style="color:var(--ink3)">Sin respuesta</em>'}</div>
      </div>`;
        }
        const cls = item.isCorrect ? 'ok' : 'fail';
        const selLabels = item.ans.map(j => item.q.options[j]?.text).filter(Boolean);
        const corrLabels = item.correctIndices.map(j => item.q.options[j]?.text).filter(Boolean);
        return `<div class="review-item ${cls}">
      <div class="review-q">${escHtml(item.q.text)}</div>
      <div class="review-answer">
        <span class="tag ${cls}">${item.isCorrect ? '✓ Correcto' : '✗ Incorrecto'}</span>
        ${!item.isCorrect ? `<br><span style="color:var(--ink3);font-size:12px">Tu respuesta: ${selLabels.join(', ') || '—'}</span><br><span style="color:var(--accent2);font-size:12px">Correcta: ${corrLabels.join(', ')}</span>` : `<span style="color:var(--ink2);font-size:12px">${selLabels.join(', ')}</span>`}
      </div>
    </div>`;
      }).join('');

      document.getElementById('shareBtn').onclick = () => shareTest(playerState.test.id);
      showView('results');
    }

    function retryTest() { startTest(playerState.test.id); }

    // ──────────────────────────────────────────
    // SHARE / IMPORT
    // ──────────────────────────────────────────
    function copyLink(url)
    {
      if (navigator.clipboard)
      {
        navigator.clipboard.writeText(url).then(
          () => showToast('¡Enlace copiado al portapapeles!'),
          () => prompt('Copia este enlace:', url)
        );
      } else
      {
        prompt('Copia este enlace:', url);
      }
    }

    async function shareTest(id)
    {
      const t = tests.find(x => x.id === id);
      if (!t) return;

      if (JSONBIN_KEY)
      {
        try
        {
          showToast('Subiendo test a la nube...');
          const res = await fetch(JSONBIN_BASE + '/b', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': JSONBIN_KEY,
              'X-Bin-Private': 'false',
              'X-Bin-Name': t.title.slice(0, 120)
            },
            body: JSON.stringify(t)
          });
          if (!res.ok) throw new Error('upload failed');
          const data = await res.json();
          const binId = data.metadata.id;
          const url = location.origin + location.pathname + '?bin=' + binId;
          copyLink(url);
          return;
        } catch (e)
        {
          showToast('Error en la nube, usando enlace largo');
        }
      }

      // Fallback: test codificado en la propia URL
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(t))));
      const url = location.origin + location.pathname + '?test=' + encoded;
      copyLink(url);
    }

    async function importTestObj(t)
    {
      if (!t || !t.id || !t.title || !t.questions) { showToast('Test no válido'); return; }

      // Los alumnos no pueden crear/guardar tests (RLS). Lo hacen una vez sin guardarlo.
      if (!isTeacher)
      {
        const temp = { ...t, id: 'temp_' + genId(), published: true };
        showModal(`Test compartido: "${t.title}"`, '¿Quieres hacer este test ahora?', () =>
        {
          tests.push(temp); // solo en memoria, para poder lanzarlo
          startTest(temp.id);
        }, 'Empezar', false);
        return;
      }

      const exists = tests.find(x => x.id === t.id);
      if (exists)
      {
        showToast('Este test ya está en tu biblioteca');
      } else
      {
        // id nuevo al importar: el test pasa a ser una copia propia del profesor
        const copy = { ...t, id: genId(), createdAt: Date.now(), updatedAt: Date.now() };
        const ok = await persistTest(copy);
        if (ok)
        {
          tests.unshift(copy);
          t = copy;
          showToast(`Test "${t.title}" importado ✓`);
        }
      }
      renderHome();
      setTimeout(() =>
      {
        showModal(`Test compartido: "${t.title}"`, '¿Quieres empezar el test ahora?', () => startTest(t.id), 'Empezar', false);
      }, 400);
    }

    async function checkImportFromUrl()
    {
      const params = new URLSearchParams(location.search);
      const binId = params.get('bin');
      const encoded = params.get('test');

      if (binId)
      {
        try
        {
          const headers = {};
          if (JSONBIN_KEY) headers['X-Master-Key'] = JSONBIN_KEY;
          const res = await fetch(JSONBIN_BASE + '/b/' + binId + '/latest', { headers });
          if (!res.ok) throw new Error('fetch failed');
          const data = await res.json();
          importTestObj(data.record);
        } catch (e)
        {
          showToast('No se pudo cargar el test compartido');
        }
        window.history.replaceState({}, '', location.pathname);
        return;
      }

      if (encoded)
      {
        try
        {
          const t = JSON.parse(decodeURIComponent(escape(atob(encoded))));
          importTestObj(t);
        } catch (e)
        {
          showToast('Error al importar el test');
        }
        window.history.replaceState({}, '', location.pathname);
      }
    }

    // ──────────────────────────────────────────
    // AUTH (Supabase)
    // ──────────────────────────────────────────
    let appReady = false;
    let authPanel = 'login'; // 'login' | 'forgot' | 'reset'

    function showLoginPanel()
    {
      authPanel = 'login';
      clearAuthMsg();
      document.getElementById('authTitle').textContent = 'Iniciar sesión';
      document.getElementById('authSub').textContent = 'Accede para crear y hacer tus tests.';
      document.getElementById('authEmail').closest('.field-group').style.display = '';
      document.getElementById('authPassword').closest('.field-group').style.display = '';
      document.getElementById('newPasswordGroup').style.display = 'none';
      document.getElementById('authSubmit').textContent = 'Entrar';
      document.getElementById('authToggle').innerHTML = '<a onclick="showForgotPanel()">¿Olvidaste tu contraseña?</a>';
      document.getElementById('authToggle').style.display = '';
    }

    function showForgotPanel()
    {
      authPanel = 'forgot';
      clearAuthMsg();
      document.getElementById('authTitle').textContent = 'Recuperar contraseña';
      document.getElementById('authSub').textContent = 'Te enviaremos un enlace para restablecer tu contraseña.';
      document.getElementById('authEmail').closest('.field-group').style.display = '';
      document.getElementById('authPassword').closest('.field-group').style.display = 'none';
      document.getElementById('newPasswordGroup').style.display = 'none';
      document.getElementById('authSubmit').textContent = 'Enviar enlace';
      document.getElementById('authToggle').innerHTML = '<a onclick="showLoginPanel()">Volver al inicio de sesión</a>';
      document.getElementById('authToggle').style.display = '';
    }

    function showResetPanel()
    {
      authPanel = 'reset';
      clearAuthMsg();
      document.body.classList.add('auth-locked');
      document.body.classList.remove('logged-in');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('authTitle').textContent = 'Nueva contraseña';
      document.getElementById('authSub').textContent = 'Introduce tu nueva contraseña.';
      document.getElementById('authEmail').closest('.field-group').style.display = 'none';
      document.getElementById('authPassword').closest('.field-group').style.display = 'none';
      document.getElementById('newPasswordGroup').style.display = '';
      document.getElementById('authNewPassword').value = '';
      document.getElementById('authSubmit').textContent = 'Cambiar contraseña';
      document.getElementById('authToggle').style.display = 'none';
    }

    async function sendResetEmail()
    {
      const email = document.getElementById('authEmail').value.trim();
      if (!email) { showAuthMsg('Introduce tu correo electrónico', 'error'); return; }
      const btn = document.getElementById('authSubmit');
      btn.disabled = true; btn.style.opacity = '0.6';
      clearAuthMsg();
      try
      {
        const { error } = await sbClient.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
        if (error) throw error;
        showAuthMsg('Enlace enviado. Revisa tu correo.', 'info');
      } catch (e)
      {
        showAuthMsg(e.message || 'Error al enviar el enlace', 'error');
      } finally
      {
        btn.disabled = false; btn.style.opacity = '1';
      }
    }

    async function updatePassword()
    {
      const password = document.getElementById('authNewPassword').value;
      if (password.length < 6) { showAuthMsg('La contraseña debe tener al menos 6 caracteres', 'error'); return; }
      const btn = document.getElementById('authSubmit');
      btn.disabled = true; btn.style.opacity = '0.6';
      clearAuthMsg();
      try
      {
        const { error } = await sbClient.auth.updateUser({ password });
        if (error) throw error;
        showAuthMsg('Contraseña actualizada correctamente.', 'info');
      } catch (e)
      {
        showAuthMsg(e.message || 'Error al actualizar la contraseña', 'error');
      } finally
      {
        btn.disabled = false; btn.style.opacity = '1';
      }
    }

    function showAuthMsg(text, type)
    {
      const el = document.getElementById('authMsg');
      el.textContent = text;
      el.className = 'auth-msg show ' + type;
    }
    function clearAuthMsg()
    {
      document.getElementById('authMsg').className = 'auth-msg';
    }

    async function submitAuth()
    {
      if (!sbClient) { showAuthMsg('Login no configurado', 'error'); return; }
      if (authPanel === 'forgot') { await sendResetEmail(); return; }
      if (authPanel === 'reset') { await updatePassword(); return; }
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      if (!email || !password) { showAuthMsg('Introduce correo y contraseña', 'error'); return; }
      if (password.length < 6) { showAuthMsg('La contraseña debe tener al menos 6 caracteres', 'error'); return; }

      const btn = document.getElementById('authSubmit');
      btn.disabled = true; btn.style.opacity = '0.6';
      clearAuthMsg();

      try
      {
        const { error } = await sbClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } catch (e)
      {
        const msg = e.message || 'Error de autenticación';
        showAuthMsg(translateAuthError(msg), 'error');
      } finally
      {
        btn.disabled = false; btn.style.opacity = '1';
      }
    }

    function translateAuthError(msg)
    {
      const m = msg.toLowerCase();
      if (m.includes('invalid login')) return 'Correo o contraseña incorrectos.';
      return msg;
    }

    async function doSignOut()
    {
      if (sbClient) await sbClient.auth.signOut();
      // onAuthStateChange se encarga de mostrar el login
    }

    async function onLogin(user)
    {
      currentUser = user;
      document.body.classList.remove('auth-locked');
      document.body.classList.add('logged-in');
      document.getElementById('userEmail').textContent = user.email || '';
      if (!appReady)
      {
        appReady = true;
        isTeacher = await fetchRole();
        document.getElementById('userRole').textContent = isTeacher ? 'Profesor' : 'Alumno';
        document.getElementById('userRole').style.display = 'inline-block';
        tests = await fetchTests();
        renderHome();
        await checkImportFromUrl();
      }
      const anyView = [...document.querySelectorAll('.view')].some(v => v.classList.contains('active'));
      if (!anyView) showView('home');
    }

    function showLogin()
    {
      currentUser = null;
      appReady = false;
      tests = [];
      document.body.classList.add('auth-locked');
      document.body.classList.remove('logged-in');
      document.getElementById('authPassword').value = '';
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      showLoginPanel();
    }

    // ──────────────────────────────────────────
    // INIT
    // ──────────────────────────────────────────
    async function init()
    {
      // Sin Supabase configurado -> modo abierto (sin login, datos locales)
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase)
      {
        document.body.classList.remove('auth-locked');
        document.body.classList.add('logged-in');
        document.getElementById('userBadge').style.display = 'none';
        appReady = true;
        isTeacher = true; // modo local/abierto: acceso completo
        tests = await fetchTests();
        renderHome();
        await checkImportFromUrl();
        return;
      }

      sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const { data } = await sbClient.auth.getSession();
      if (data.session) onLogin(data.session.user);
      else showLogin();

      sbClient.auth.onAuthStateChange((_event, session) =>
      {
        if (_event === 'PASSWORD_RECOVERY') showResetPanel();
        else if (session) onLogin(session.user);
        else showLogin();
      });

      // Enter para enviar el formulario
      ['authEmail', 'authPassword', 'authNewPassword'].forEach(id =>
      {
        document.getElementById(id).addEventListener('keydown', e =>
        {
          if (e.key === 'Enter') submitAuth();
        });
      });
    }

    init();

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', e =>
    {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
  </script>
</body>

</html>
